<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Красная нить: верхняя петля и нижний завиток -->
  <g stroke="#E11B22" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M104 70 C78 52 72 78 90 84 C112 91 108 60 78 74 C50 88 46 150 74 168"/>
    <path d="M92 200 C88 224 150 232 180 214 C214 194 214 168 194 168 C176 168 178 196 202 190"/>
  </g>

  <!-- Тело катушки (шпульки) с чёрным контуром -->
  <path d="M96 70 C96 62 100 60 108 60 L148 60 C156 60 160 62 160 70
           C160 84 172 92 172 118 C172 150 166 168 150 188
           C138 202 118 202 106 188 C90 168 84 150 84 118
           C84 92 96 84 96 70 Z"
        fill="#FDF3EF" stroke="#111" stroke-width="8" stroke-linejoin="round"/>

  <!-- Красная намотка нити (полосы по телу катушки) -->
  <g stroke="#E11B22" stroke-width="9" stroke-linecap="round" fill="none">
    <path d="M99 78 C118 70 140 70 158 78"/>
    <path d="M92 96 C116 86 146 86 168 98"/>
    <path d="M89 116 C116 104 150 104 172 118"/>
    <path d="M90 138 C116 126 150 128 170 140"/>
    <path d="M96 160 C118 150 146 150 162 160"/>
    <path d="M108 180 C120 174 138 174 148 180"/>
  </g>

  <!-- Верхняя и нижняя «шляпки» катушки -->
  <path d="M90 58 C96 50 160 50 166 58 C160 68 96 68 90 58 Z" fill="#111"/>
  <path d="M100 192 C112 200 144 200 156 192 C148 204 108 204 100 192 Z" fill="#111"/>

  <!-- Игла: диагональ из верхнего-левого угла в нижний-правый -->
  <g transform="rotate(32 128 128)">
    <rect x="60" y="120" width="150" height="18" rx="9"
          fill="#FDF3EF" stroke="#111" stroke-width="8"/>
    <!-- Остриё -->
    <path d="M210 120 L232 129 L210 138 Z" fill="#111"/>
    <!-- Ушко иглы -->
    <ellipse cx="82" cy="129" rx="12" ry="6" fill="#E11B22" stroke="#111" stroke-width="6"/>
  </g>
</svg>
